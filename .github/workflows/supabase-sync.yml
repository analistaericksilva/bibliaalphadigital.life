name: Supabase Sync v2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-supabase:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRucWNjcmpkeG1ueG14aXVwZXNnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTgzNjQ4OSwiZXhwIjoyMDkxNDEyNDg5fQ.3vemOLAP4iHYf2DmC4Xx92xJHSw9fK49MikLxNdCF6U
      SUPABASE_PROJECT_REF: dnqccrjdxmnxmxiupesg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "$DB_PASSWORD" | supabase link --project-ref dnqccrjdxmnxmxiupesg --password-stdin

      - name: Push database migrations
        run: supabase db push

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref dnqccrjdxmnxmxiupesg --all
