name: Deploy to Napolion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Napolion via FTP
        uses: SamMarchand/ftp-action@v1.2.1
        with:
          host: ${{ vars.FTP_HOST }}
          username: ${{ vars.FTP_USER }}
          password: ${{ vars.FTP_PASS }}
          localDir: './dist'
          remoteDir: '/public_html'
          dryRun: false